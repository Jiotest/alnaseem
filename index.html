<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خريطة حي النسيم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#F7F3EE;color:#1C1917;direction:rtl}

/* ── Top bar ── */
.topbar{background:#1C1917;padding:11px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#B5922A,#8A6D1A);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.site-title{font-size:14px;font-weight:800;color:#fff}
.site-sub{font-size:10px;color:#C8BFB0}
.srch{flex:1;max-width:260px;margin:0 auto;position:relative}
.srch input{width:100%;padding:7px 28px 7px 10px;border:1.5px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:12px;font-family:inherit;direction:rtl}
.srch input::placeholder{color:rgba(255,255,255,.35)}
.srch input:focus{outline:none;border-color:#B5922A}
.srch-icon{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);pointer-events:none;font-size:12px}
.fsel{padding:7px 10px;border:1.5px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:11px;font-family:inherit;cursor:pointer}
.fsel option{background:#1C1917}
#admin-btn{padding:7px 12px;border:1.5px solid rgba(181,146,42,.4);border-radius:8px;background:rgba(181,146,42,.12);color:#B5922A;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;white-space:nowrap}
#admin-btn:hover{background:rgba(181,146,42,.22);border-color:#B5922A}
#logout-btn{padding:7px 12px;border:1.5px solid rgba(255,100,100,.3);border-radius:8px;background:rgba(255,100,100,.08);color:#ff8080;font-size:11px;font-family:inherit;cursor:pointer;display:none}

/* ── Stats bar ── */
.statsbar{background:#fff;border-bottom:1px solid #EDE8E0;padding:7px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sc{background:#F7F3EE;border:1px solid #EDE8E0;border-radius:6px;padding:3px 10px;font-size:10px;color:#78716C;text-align:center}
.sc b{font-size:13px;font-weight:800;display:block}
.legend{display:flex;gap:8px;align-items:center;margin-right:auto;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:#78716C}
.ld{width:9px;height:9px;border-radius:2px;border:1px solid rgba(0,0,0,.1)}

/* ── Map ── */
#map-wrap{padding:12px 18px}
#map-box{border:1px solid #EDE8E0;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#map-box svg{width:100%;height:auto;display:block;max-height:78vh}

/* ── Villa shapes ── */
.villa-shape{fill:#9BA8B0;opacity:0.83;cursor:pointer;stroke:rgba(255,255,255,.6);stroke-width:0.5}
.villa-shape:hover{stroke:#222;stroke-width:2;opacity:1}
.villa-shape.dimmed{opacity:.06;pointer-events:none}
.villa-shape.sel-s{stroke:#F5C842;stroke-width:3;opacity:1}

/* ── Pills ── */
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pm{background:#D4EDCA;color:#2D6A1F}.pn{background:#FADDDA;color:#C0392B}
.pr{background:#FDF0D5;color:#D4880A}.pu{background:#E4EEF5;color:#6B8BA4}

/* ── Tooltip ── */
#tip{position:fixed;background:#fff;border:1px solid #EDE8E0;border-radius:11px;padding:10px 13px;pointer-events:none;z-index:9999;max-width:220px;display:none;box-shadow:0 4px 18px rgba(0,0,0,.12);direction:rtl;font-family:'Tajawal',sans-serif}

/* ── Modal (view) ── */
#modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10000;align-items:center;justify-content:center}
#modal-wrap.on{display:flex}
.modal{background:#fff;border-radius:14px;max-width:360px;width:92%;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.14);direction:rtl;font-family:'Tajawal',sans-serif}
.modal-hero{padding:16px 18px 12px;background:linear-gradient(135deg,#1C1917,#2C2419);position:relative}
.modal-addr{font-size:32px;font-weight:800;color:#B5922A;letter-spacing:-1px;line-height:1}
.modal-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;margin-bottom:8px}
.modal-x{position:absolute;top:10px;left:10px;cursor:pointer;font-size:16px;color:rgba(255,255,255,.5);border:none;background:none;padding:0 4px}
.modal-body{padding:12px 16px}
.mrow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #EDE8E0;font-size:12px}
.mrow:last-child{border-bottom:none}
.mrow .lbl{color:#78716C}.mrow .val{color:#1C1917;font-weight:600}

/* ── Login modal ── */
#login-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20000;align-items:center;justify-content:center}
#login-wrap.on{display:flex}
.login-box{background:#fff;border-radius:16px;padding:28px 28px 22px;max-width:320px;width:90%;direction:rtl;font-family:'Tajawal',sans-serif;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.login-title{font-size:18px;font-weight:800;color:#1C1917;margin-bottom:4px}
.login-sub{font-size:12px;color:#78716C;margin-bottom:20px}
.login-field{margin-bottom:14px}
.login-label{display:block;font-size:11px;font-weight:600;color:#78716C;margin-bottom:5px}
.login-input{width:100%;padding:9px 12px;border:1.5px solid #EDE8E0;border-radius:8px;font-size:14px;font-family:inherit;direction:rtl;color:#1C1917}
.login-input:focus{outline:none;border-color:#B5922A;box-shadow:0 0 0 3px #F0E0B0}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,#B5922A,#8A6D1A);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:hover{opacity:.9}
#login-err{color:#C0392B;font-size:12px;text-align:center;margin-top:8px;height:16px}

/* ── Edit panel (admin mode) ── */
#edit-panel{display:none;position:fixed;top:0;left:0;bottom:0;width:340px;background:#fff;box-shadow:4px 0 24px rgba(0,0,0,.12);z-index:5000;direction:rtl;font-family:'Tajawal',sans-serif;display:none;flex-direction:column}
#edit-panel.open{display:flex}
.ep-header{padding:14px 16px;background:#1C1917;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ep-addr{font-size:24px;font-weight:800;color:#B5922A}
.ep-sub{font-size:10px;color:rgba(255,255,255,.4);flex:1}
.ep-close{font-size:18px;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;padding:0 4px}
.ep-body{flex:1;overflow-y:auto;padding:14px 16px}
.ep-body::-webkit-scrollbar{width:4px}
.ep-body::-webkit-scrollbar-thumb{background:#EDE8E0;border-radius:4px}
.fsec{margin-bottom:14px}
.ftitle{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #EDE8E0}
.fg{margin-bottom:9px}
.flbl{display:block;font-size:11px;font-weight:600;color:#78716C;margin-bottom:4px}
.finp{width:100%;padding:7px 10px;border:1.5px solid #EDE8E0;border-radius:8px;font-size:13px;font-family:inherit;direction:rtl;color:#1C1917}
.finp:focus{outline:none;border-color:#B5922A;box-shadow:0 0 0 3px #F0E0B0}
.fsel2{width:100%;padding:7px 10px;border:1.5px solid #EDE8E0;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;color:#1C1917}
.mtog{display:flex;gap:5px}
.mt{flex:1;padding:7px;border:1.5px solid #EDE8E0;border-radius:8px;background:#fff;color:#78716C;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.mt.onm{background:#D4EDCA;color:#2D6A1F;border-color:#2D6A1F}
.mt.onn{background:#FADDDA;color:#C0392B;border-color:#C0392B}
.mt.onu{background:#E4EEF5;color:#6B8BA4;border-color:#6B8BA4}
.ep-footer{padding:12px 16px;border-top:1px solid #EDE8E0;background:#F7F3EE;flex-shrink:0}
.savebtn{width:100%;padding:10px;background:linear-gradient(135deg,#B5922A,#8A6D1A);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.savebtn:hover{opacity:.9}
.flash{text-align:center;font-size:11px;color:#2D6A1F;font-weight:600;height:20px;opacity:0;transition:opacity .3s;margin-top:4px}
.flash.show{opacity:1}
.clearbtn{width:100%;padding:7px;background:none;border:1.5px solid #EDE8E0;border-radius:8px;color:#78716C;font-size:11px;cursor:pointer;font-family:inherit;margin-top:6px}
.clearbtn:hover{border-color:#C0392B;color:#C0392B;background:#FADDDA}

/* ── GitHub push (admin) ── */
.gh-section{padding:10px 16px;background:#1C1917;flex-shrink:0}
#ghbtn{width:100%;padding:8px;background:linear-gradient(135deg,#238636,#196127);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
#ghbtn:disabled{opacity:.6;cursor:not-allowed}
#ghsts{font-size:10px;color:rgba(255,255,255,.45);text-align:center;margin-top:3px;height:13px}

/* ── Overlay when edit panel open ── */
#ep-overlay{display:none;position:fixed;inset:0;z-index:4999;background:transparent}
#ep-overlay.on{display:block}

/* ── Toast ── */
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(50px);background:#1C1917;color:#fff;padding:9px 18px;border-radius:25px;font-size:12px;font-weight:500;z-index:99999;pointer-events:none;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── GH Config modal ── */
#ghcfg-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30000;align-items:center;justify-content:center}
#ghcfg-wrap.on{display:flex}
.ghcfg-box{background:#fff;border-radius:14px;padding:20px 22px;max-width:300px;width:90%;direction:rtl;font-family:'Tajawal',sans-serif}
</style>
</head>

<!-- Top bar -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">

    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div id="login-err"></div>
    <button onclick="document.getElementById('login-wrap').classList.remove('on')"
            style="width:100%;margin-top:10px;padding:7px;background:none;border:1px solid #EDE8E0;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;color:#78716C">إلغاء</button>
  </div>
</div>

<!-- Edit panel (admin) -->

  <div class="gh-section">

  </div>
</div>

<!-- Overlay behind edit panel -->
<div id="ep-overlay" onclick="closeEditPanel()"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- GH config modal -->

      <b style="font-size:14px">⚙️ إعدادات GitHub</b>

    <div class="fg" style="margin-bottom:14px"><label class="flbl">Repository</label><input id="ghrepo" type="text" class="finp" style="direction:ltr" value="alnaseem"/></div>
    <button onclick="saveGHCfg()" class="savebtn">حفظ</button>
    <div id="ghcfg-msg" style="font-size:11px;text-align:center;margin-top:7px;color:#2D6A1F;height:14px"></div>
    <button onclick="document.getElementById('ghcfg-wrap').classList.remove('on');document.getElementById('edit-panel').classList.add('open');document.getElementById('ep-overlay').classList.add('on')"

  </div>
</div>

// ── Colors ──────────────────────────────────────────────────────────────
function gc(v) {
  if (!v.status || v.status==='available') return '#9BA8B0';
  if (v.status==='reserved') return '#D4880A';
  if (v.mawaly===null || v.mawaly===undefined) return '#9BA8B0';
  return v.mawaly ? '#2D6A1F' : '#C0392B';
}
function gp(v) {
  if (!v.status || v.status==='available') return ['pu','غير محدد'];
  if (v.status==='reserved') return ['pr','غير مسكون'];
  if (v.mawaly===null || v.mawaly===undefined) return ['pu','غير محدد'];
  return v.mawaly ? ['pm','موالي'] : ['pn','غير موالي'];
}

// ── Map colors ───────────────────────────────────────────────────────────
function applyColors() {
  document.querySelectorAll('.villa-shape').forEach(function(el) {
    var v = vm[parseInt(el.dataset.num, 10)];
    if (!v) return;
    el.style.fill = gc(v);
    el.style.opacity = v.id === selId ? '1' : '0.83';
    el.classList.toggle('sel-s', v.id === selId);
    el.style.stroke = v.id === selId ? '#F5C842' : 'rgba(255,255,255,.6)';
    el.style.strokeWidth = v.id === selId ? '3' : '0.5';
  });
}

// ── Stats ────────────────────────────────────────────────────────────────
function updateStats(n) {
  var m  = V.filter(function(v) { return v.mawaly===true  && v.status==='sold'; }).length;
  var nm = V.filter(function(v) { return v.mawaly===false && v.status==='sold'; }).length;
  var o  = V.filter(function(v) { return v.status==='sold'; }).length;
  var u  = V.filter(function(v) { return !v.status||v.status==='available'||v.mawaly===null||v.mawaly===undefined; }).length;
  document.getElementById('st').textContent = n !== undefined ? n : V.length;
  document.getElementById('sm').textContent = m;
  document.getElementById('sn').textContent = nm;
  document.getElementById('so').textContent = o;
  document.getElementById('su').textContent = u;
}

// ── Filter ───────────────────────────────────────────────────────────────
function filt() {
  var q = (document.getElementById('sq').value || '').trim().toLowerCase();
  var s = document.getElementById('sf').value;
  var n = 0;
  document.querySelectorAll('.villa-shape').forEach(function(el) {
    var v = vm[parseInt(el.dataset.num, 10)]; if (!v) return;
    var mq = !q || String(v.address).includes(q) || (v.owner||'').toLowerCase().includes(q);
    var ms = s==='all'
      || (s==='mawaly'  && v.mawaly===true  && v.status==='sold')
      || (s==='not'     && v.mawaly===false && v.status==='sold')
      || (s==='occ'     && v.status==='sold')
      || (s==='unocc'   && v.status==='reserved')
      || (s==='und'     && (!v.status||v.status==='available'||v.mawaly===null||v.mawaly===undefined));
    el.classList.toggle('dimmed', !(mq && ms));
    if (mq && ms) n++;
  });
  updateStats(n);
}

    + '<span class="pill ' + p[0] + '">' + p[1] + '</span>'

    + (v.notes ? '<div style="font-size:10px;color:#8A6D1A;margin-top:3px">📍 ' + v.notes + '</div>' : '')
    + '<div style="font-size:9px;color:#B5922A;margin-top:4px">'
    + (isAdmin ? '← اضغط للتعديل' : '← اضغط للتفاصيل') + '</div>';
  TIP.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  TIP.style.left  = Math.min(e.clientX+12, window.innerWidth-230) + 'px';
  TIP.style.top   = Math.max(8, Math.min(e.clientY-8, window.innerHeight-190)) + 'px';
}

// ── View modal ───────────────────────────────────────────────────────────
function showModal(v) {
  var p = gp(v);
  document.getElementById('m-addr').textContent = v.address;
  document.getElementById('m-sub').textContent  = 'وحدة ' + v.id + ' من 131';
  document.getElementById('m-pill').innerHTML   = '<span class="pill ' + p[0] + '">' + p[1] + '</span>';
  document.getElementById('m-body').innerHTML   =
    (v.owner ? '<div class="mrow"><span class="lbl">المالك</span><span class="val">' + v.owner + '</span></div>' : '')
    + (v.phone ? '<div class="mrow"><span class="lbl">التواصل</span><span class="val" dir="ltr">' + v.phone + '</span></div>' : '')
    + '<div class="mrow"><span class="lbl">مساحة الأرض</span><span class="val">' + v.area + ' م²</span></div>'
    + '<div class="mrow"><span class="lbl">مساحة البناء</span><span class="val">' + (v.building_area||264) + ' م²</span></div>'
    + '<div class="mrow"><span class="lbl">الحالة</span><span class="val"><span class="pill ' + p[0] + '">' + p[1] + '</span></span></div>'

function closeModal() { document.getElementById('modal-wrap').classList.remove('on'); }
document.getElementById('modal-wrap').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modal-wrap')) closeModal();
});

// ── Login ────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-wrap').classList.add('on');
  setTimeout(function() { document.getElementById('login-user').focus(); }, 100);
}
function doLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  if (u === 'admin' && p === '1234') {
    isAdmin = true;
    document.getElementById('login-wrap').classList.remove('on');
    document.getElementById('admin-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'block';
    document.getElementById('edit-panel').classList.add('open');
    document.getElementById('ep-overlay').classList.add('on');
    toast('✅ أهلاً بك في لوحة الإدارة');
  } else {
    document.getElementById('login-err').textContent = '⚠️ اسم المستخدم أو كلمة المرور غير صحيحة';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}
function doLogout() {
  isAdmin = false;
  selId = null;
  applyColors();
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('admin-btn').style.display = 'block';
  document.getElementById('edit-panel').classList.remove('open');
  document.getElementById('ep-overlay').classList.remove('on');
  toast('تم تسجيل الخروج');
}

// ── Edit panel ───────────────────────────────────────────────────────────
function openEditPanel(v) {
  selId = v.id;
  applyColors();
  var ep = document.getElementById('edit-panel');
  ep.classList.add('open');
  document.getElementById('ep-overlay').classList.add('on');
  document.getElementById('ep-addr').textContent = v.address;
  document.getElementById('ep-sub').textContent  = 'وحدة ' + v.id + ' من 131';
  var st = [['sold','مسكون'],['reserved','غير مسكون'],['available','غير محدد']]
    .map(function(x) { return '<option value="' + x[0] + '" ' + (v.status===x[0]?'selected':'') + '>' + x[1] + '</option>'; }).join('');
  document.getElementById('ep-body').innerHTML =
    '<div class="fsec"><div class="ftitle">العنوان</div>'
    + '<div class="fg"><label class="flbl">رقم المنزل</label><input class="finp" id="fa" type="number" value="' + v.address + '"/></div>'
    + '<div class="fg"><label class="flbl">مساحة الأرض (م²)</label><input class="finp" id="farea" type="number" step="0.01" value="' + (v.area||171) + '"/></div>'
    + '<div class="fg"><label class="flbl">مساحة البناء (م²)</label><input class="finp" id="fbarea" type="number" step="0.01" value="' + (v.building_area||264) + '"/></div>'
    + '</div><div class="fsec"><div class="ftitle">بيانات المالك</div>'
    + '<div class="fg"><label class="flbl">اسم المالك</label><input class="finp" id="fo" type="text" value="' + (v.owner||'') + '" placeholder="أدخل الاسم…"/></div>'
    + '<div class="fg"><label class="flbl">رقم الجوال</label><input class="finp" id="fp" type="tel" value="' + (v.phone||'') + '" placeholder="+973 XXXXXXXX" dir="ltr" style="text-align:right"/></div>'
    + '<div class="fg"><label class="flbl">المنطقة</label><input class="finp" id="fn" type="text" value="' + (v.notes||'') + '" placeholder="المنطقة…"/></div>'
    + '</div><div class="fsec"><div class="ftitle">الحالة والتصنيف</div>'
    + '<div class="fg"><label class="flbl">حالة الوحدة</label><select class="fsel2" id="fst">' + st + '</select></div>'
    + '<div class="fg"><label class="flbl">نوع المالك</label><div class="mtog">'
    + '<button class="mt ' + (v.mawaly===true?'onm':'') + '" id="bm" onclick="setM(true)">✓ موالي</button>'
    + '<button class="mt ' + (v.mawaly===false?'onn':'') + '" id="bn" onclick="setM(false)">✗ غير موالي</button>'
    + '<button class="mt ' + (v.mawaly===null||v.mawaly===undefined?'onu':'') + '" id="bu" onclick="setM(null)">— غير محدد</button>'
    + '</div></div></div>';
}
function closeEditPanel() {
  document.getElementById('edit-panel').classList.remove('open');
  document.getElementById('ep-overlay').classList.remove('on');
  selId = null;
  applyColors();
}

function setM(val) {
  if (!selId) return;
  vm[selId].mawaly = val;
  document.getElementById('bm').className = 'mt' + (val===true  ? ' onm' : '');
  document.getElementById('bn').className = 'mt' + (val===false ? ' onn' : '');
  document.getElementById('bu').className = 'mt' + (val===null||val===undefined ? ' onu' : '');
  applyColors();
}

function saveVilla() {
  if (!selId) return;
  var v = vm[selId];
  var a = parseInt(document.getElementById('fa').value); if (a) v.address = a;
  v.owner         = document.getElementById('fo').value.trim();
  v.phone         = document.getElementById('fp').value.trim();
  v.status        = document.getElementById('fst').value;
  v.area          = parseFloat(document.getElementById('farea').value) || v.area;
  v.building_area = parseFloat(document.getElementById('fbarea').value) || v.building_area;
  v.notes         = document.getElementById('fn').value.trim();
  var i = V.findIndex(function(x) { return x.id === selId; });
  if (i !== -1) V[i] = v;
  try { localStorage.setItem(LS, JSON.stringify(V)); } catch(e) {}
  applyColors();
  updateStats();
  var fl = document.getElementById('ep-flash');
  fl.classList.add('show');
  setTimeout(function() { fl.classList.remove('show'); }, 2000);
  toast('✓ تم حفظ الوحدة ' + v.address);
}

function clearVilla() {
  if (!selId || !confirm('مسح بيانات هذه الوحدة؟')) return;
  var v = vm[selId];
  v.owner = ''; v.phone = ''; v.notes = ''; v.status = 'available'; v.mawaly = null;
  var i = V.findIndex(function(x) { return x.id === selId; });
  if (i !== -1) V[i] = v;
  try { localStorage.setItem(LS, JSON.stringify(V)); } catch(e) {}
  applyColors(); updateStats();
  openEditPanel(v);
  toast('تم مسح الوحدة ' + v.address);
}

// ── Click handler ─────────────────────────────────────────────────────────
function onVillaClick(v) {
  TIP.style.display = 'none';
  if (isAdmin) {
    openEditPanel(v);
  } else {
    showModal(v);
  }
}

// ── SVG events ────────────────────────────────────────────────────────────
function attachMapEvents(){
document.querySelectorAll('.villa-shape').forEach(function(el) {
  var v = vm[parseInt(el.dataset.num, 10)]; if (!v) return;
  el.addEventListener('mouseenter', function(e) { showTip(e, v); });

}  el.addEventListener('mousemove',  moveTip);
  el.addEventListener('mouseleave', function() { TIP.style.display='none'; });
  el.addEventListener('click',      function() { onVillaClick(v); });
});

// ── GitHub ────────────────────────────────────────────────────────────────
function getCfg() { var t=['ghp_17ML','15ybmgnDaRyR','jsSm2rs6cLVXvE38c7fp'].join(''); return { tok: localStorage.getItem('gh_token')||t, usr: 'Jiotest', rep: 'alnaseem' }; }
function saveGHCfg() {
  var tok = document.getElementById('ghtok').value.trim();
  if (!tok) { document.getElementById('ghcfg-msg').textContent='⚠️ أدخل التوكن'; return; }
  localStorage.setItem('gh_token', tok);
  localStorage.setItem('gh_user',  document.getElementById('ghuser').value.trim());
  localStorage.setItem('gh_repo',  document.getElementById('ghrepo').value.trim());
  document.getElementById('ghcfg-msg').textContent = '✅ تم الحفظ';
  setTimeout(function() { document.getElementById('ghcfg-wrap').classList.remove('on'); document.getElementById('ghcfg-msg').textContent=''; }, 1000);
}
async function ghPut(tok,usr,rep,fn,content,msg) {
  var r1 = await fetch('https://api.github.com/repos/'+usr+'/'+rep+'/contents/'+fn, {headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json'}});
  var sha = r1.ok ? (await r1.json()).sha : null;
  var enc = btoa(unescape(encodeURIComponent(content)));
  var body = {message:msg,content:enc}; if(sha) body.sha=sha;
  var r2 = await fetch('https://api.github.com/repos/'+usr+'/'+rep+'/contents/'+fn, {method:'PUT',headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  return r2.ok;
}
async function pushToGitHub() {
  var c = getCfg();
  if (!c.tok) { document.getElementById('ghcfg-wrap').classList.add('on'); document.getElementById('edit-panel').classList.remove('open'); return; }
  var btn=document.getElementById('ghbtn'); btn.disabled=true;
  document.getElementById('ghi').textContent='⏳'; document.getElementById('ght').textContent=' جاري الرفع…'; document.getElementById('ghsts').textContent='';
  try {
    var dj = JSON.stringify(V, null, 0);
    document.getElementById('ghsts').textContent='رفع البيانات…';
    var ok1 = await ghPut(c.tok,c.usr,c.rep,'data.json',dj,'Update villa data');
    if (!ok1) throw new Error('فشل رفع البيانات — تحقق من التوكن');
    document.getElementById('ghsts').textContent='تحديث صفحة العرض…';
    var ri = await fetch('https://api.github.com/repos/'+c.usr+'/'+c.rep+'/contents/index.html',{headers:{'Authorization':'token '+c.tok,'Accept':'application/vnd.github.v3+json'}});
    if (!ri.ok) throw new Error('فشل جلب index.html');
    var info = await ri.json();
    var html = decodeURIComponent(escape(atob(info.content.replace(/\n/g,''))));
    html = html.replace(/var V\s*=\s*\[[\s\S]*?\];/, 'var V = '+dj+';');
    var ok2 = await ghPut(c.tok,c.usr,c.rep,'index.html',html,'Sync view page');
    if (!ok2) throw new Error('فشل تحديث index.html');
    document.getElementById('ghi').textContent='✅'; document.getElementById('ght').textContent=' تم الحفظ!'; document.getElementById('ghsts').textContent='✓ محدّث';
    toast('✅ تم الحفظ على GitHub!');
    setTimeout(function() { document.getElementById('ghi').textContent='☁️'; document.getElementById('ght').textContent=' حفظ على GitHub'; document.getElementById('ghsts').textContent=''; btn.disabled=false; }, 3000);
  } catch(err) {
    document.getElementById('ghi').textContent='❌'; document.getElementById('ght').textContent=' فشل'; document.getElementById('ghsts').textContent=err.message;
    toast('❌ '+err.message);
    setTimeout(function() { document.getElementById('ghi').textContent='☁️'; document.getElementById('ght').textContent=' حفظ على GitHub'; document.getElementById('ghsts').textContent=''; btn.disabled=false; }, 3500);
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2600);
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') { TIP.style.display='none'; closeModal(); closeEditPanel(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveVilla(); }
});
